<html lang="es">
<head>

<title>MedOS — Plan 90 días</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────────────────────────── */
:root {
  --bg:        #FAF7FD;
  --s1:        #FFFFFF;
  --s2:        #F5F0FA;
  --s3:        #ECE3F5;
  --border:    #E8DFF2;
  --border2:   #DCCFEC;

  --text:      #3E3757;
  --text2:     #948BAE;
  --text3:     #B9B0CE;

  --accent:    #B4A2F5;
  --accent2:   #9885EE;
  --accent-dim:#B4A2F522;
  --accent-glow: 0 6px 20px #B4A2F540;

  --green:     #8FDBB6;
  --green-dim: #8FDBB630;
  --yellow:    #F7CE8A;
  --yellow-dim:#F7CE8A30;
  --red:       #F5A7AE;
  --red-dim:   #F5A7AE30;
  --blue:      #A3D4F2;
  --blue-dim:  #A3D4F230;

  /* variantes más oscuras, solo para texto legible sobre fondos pastel */
  --green-ink: #4FA97D;
  --yellow-ink:#C98A2E;
  --red-ink:   #D9707E;
  --blue-ink:  #4E9BC7;

  --r-sm: 12px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;

  --nav-h: 68px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --trans: 180ms cubic-bezier(.4,0,.2,1);
}

body.dark-mode {
  --bg:        #0E0B16;
  --s1:        #181424;
  --s2:        #231F35;
  --s3:        #312B47;
  --border:    #2F2944;
  --border2:   #443B60;

  --text:      #E4DFEC;
  --text2:     #A59EB9;
  --text3:     #7E7696;

  --accent:    #9885EE;
  --accent2:   #B4A2F5;
  --accent-dim:#9885EE33;
  --accent-glow: 0 6px 20px #9885EE40;

  --green:     #4FA97D;
  --green-dim: #4FA97D25;
  --yellow:    #C98A2E;
  --yellow-dim:#C98A2E25;
  --red:       #D9707E;
  --red-dim:   #D9707E25;
  --blue:      #4E9BC7;
  --blue-dim:  #4E9BC725;

  --green-ink: #8FDBB6;
  --yellow-ink:#F7CE8A;
  --red-ink:   #F5A7AE;
  --blue-ink:  #A3D4F2;
}

/* ── MODO GUARDIA SWITCH ────────────────────────────────────────────────── */
.theme-toggle-btn {
  position: absolute; top: 16px; right: 16px; z-index: 150;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--s1); border: 1px solid var(--border);
  color: var(--text); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--trans);
  box-shadow: 0 2px 8px rgba(152, 133, 238, 0.15);
}
.theme-toggle-btn:active { transform: scale(0.9); }

/* ── ECG DYNAMIC STROKE ─────────────────────────────────────────────────── */
.ecg-path {
  stroke: var(--accent) !important;
  opacity: 0.8;
}

/* ── DIMMED FLOW FOR INICIO ─────────────────────────────────────────────── */
.dimmed-flow {
  opacity: 0.3;
  filter: grayscale(0.5);
  transition: opacity var(--trans), filter var(--trans);
}
.dimmed-flow:hover, .dimmed-flow:focus-within {
  opacity: 1;
  filter: none;
}

/* ── GIANT PLAY BUTTON ──────────────────────────────────────────────────── */
.play-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 18px 0;
}
.play-btn-giant {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 25px rgba(152, 133, 238, 0.45);
  transition: all var(--trans);
  border: none;
  cursor: pointer;
  outline: none;
}
.play-btn-giant:active {
  transform: scale(0.93);
  box-shadow: 0 4px 12px rgba(152, 133, 238, 0.3);
}
.play-btn-giant span.play-icon {
  font-size: 32px;
  margin-left: 6px;
  line-height: 1;
}
.play-btn-label {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
}

/* ── DYNAMIC STREAK (RACHA VIVA) ───────────────────────────────────────── */
.streak-active {
  color: #FF5A19 !important;
  text-shadow: 0 0 10px rgba(255, 90, 25, 0.6), 0 0 20px rgba(152, 133, 238, 0.4);
  animation: racha-glow 1.5s ease-in-out infinite alternate;
  font-weight: 800;
}
.streak-pending {
  color: var(--text3) !important;
  opacity: 0.5;
  animation: racha-pulse 2s infinite;
}
@keyframes racha-glow {
  from { text-shadow: 0 0 6px rgba(255, 90, 25, 0.4), 0 0 12px rgba(152, 133, 238, 0.3); }
  to { text-shadow: 0 0 14px rgba(255, 90, 25, 0.8), 0 0 24px rgba(152, 133, 238, 0.6); }
}
@keyframes racha-pulse {
  0% { opacity: 0.35; }
  50% { opacity: 0.75; }
  100% { opacity: 0.35; }
}

/* ── LOGROS (MEDALLAS) ──────────────────────────────────────────────────── */
.medals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
  gap: 10px;
  margin-top: 10px;
}
.medal-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 10px 6px;
  text-align: center;
  transition: all var(--trans);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.medal-card.locked {
  opacity: 0.35;
  filter: grayscale(1);
}
.medal-icon {
  font-size: 26px;
}
.medal-name {
  font-size: 9.5px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.medal-desc {
  font-size: 8px;
  color: var(--text3);
  line-height: 1.1;
}

/* ── VISOR MODAL NO ENTENDI ─────────────────────────────────────────────── */
.ne-modal {
  position: fixed; inset: 0; background: rgba(14, 11, 22, 0.65);
  backdrop-filter: blur(8px); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity var(--trans);
  padding: 16px;
}
.ne-modal.open {
  opacity: 1; pointer-events: auto;
}
.ne-modal-content {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r-lg); width: 100%; max-width: 480px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  display: flex; flex-direction: column; max-height: 85vh;
  transform: scale(0.95); transition: transform var(--trans);
}
.ne-modal.open .ne-modal-content {
  transform: scale(1);
}
.ne-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px; border-bottom: 1px solid var(--border);
}
.ne-modal-title-row {
  display: flex; align-items: center; gap: 8px;
}
#ne-modal-icon { font-size: 20px; }
#ne-modal-title { font-size: 15px; font-weight: 800; color: var(--text); }
.ne-modal-close {
  background: none; border: none; font-size: 24px; color: var(--text3);
  cursor: pointer; transition: color var(--trans);
}
.ne-modal-close:hover { color: var(--text); }
.ne-modal-body {
  padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
}
.ne-modal-desc {
  font-size: 12px; color: var(--text2); line-height: 1.5;
}
.ne-prompt-box {
  background: var(--s2); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 12px; max-height: 120px;
  overflow-y: auto;
}
.ne-prompt-box pre {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  white-space: pre-wrap; word-break: break-word; color: var(--text);
}
.ne-actions-row {
  display: flex; gap: 8px;
}
.ne-actions-row .btn {
  flex: 1; padding: 12px; font-size: 13px;
}
.ne-notes-integration {
  border-top: 1px dashed var(--border2);
  padding-top: 12px;
}

/* ── BITACORA DE INSIGHTS ───────────────────────────────────────────────── */
.bitacora-item {
  background: var(--s2);
  border-radius: var(--r-sm);
  padding: 10px;
  margin-bottom: 8px;
}

/* ── RESET ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
button { font-family: inherit; border: none; cursor: pointer; }
input, textarea, select { font-family: inherit; }
::-webkit-scrollbar { display: none; }

/* ── LAYOUT ─────────────────────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100%; position: relative; }

.screen {
  display: none; flex: 1; overflow-y: auto; padding: 16px 16px calc(var(--nav-h) + var(--safe-b) + 16px);
}
.screen.active { display: block; }

/* ── BOTTOM NAV ─────────────────────────────────────────────────────────── */
#nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-b));
  padding-bottom: var(--safe-b);
  background: var(--s1);
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-start;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; height: var(--nav-h); padding-top: 8px;
  color: var(--text3); transition: color var(--trans); background: none;
  font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
  position: relative;
}
.nav-btn.active { color: var(--accent2); }
.nav-btn .icon { font-size: 22px; transition: transform var(--trans); }
.nav-btn.active .icon { transform: translateY(-1px); }
.nav-btn::after {
  content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
  width: 0; height: 2px; background: var(--accent); border-radius: 99px;
  transition: width var(--trans);
}
.nav-btn.active::after { width: 28px; }

/* ── SHARED COMPONENTS ──────────────────────────────────────────────────── */
.page-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.page-title {
  font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
}
.page-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--s1); border: 1px solid var(--border);
  color: var(--text2); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--trans);
}
.icon-btn:active { transform: scale(0.92); background: var(--s2); }

.card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 16px;
  margin-bottom: 10px;
  box-shadow: 0 2px 14px #B4A2F51A;
}
.card-sm { padding: 12px 14px; border-radius: var(--r-md); }

.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600;
}

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 20px; border-radius: var(--r-md);
  font-size: 15px; font-weight: 600; transition: all var(--trans);
  width: 100%; cursor: pointer;
}
.btn-primary {
  background: var(--accent); color: white;
  box-shadow: var(--accent-glow);
}
.btn-primary:active { transform: scale(0.97); opacity: 0.9; }
.btn-secondary {
  background: var(--s2); color: var(--text); border: 1px solid var(--border2);
}
.btn-secondary:active { transform: scale(0.97); }
.btn-ghost { background: none; color: var(--text2); font-size: 13px; padding: 8px 12px; width: auto; }

.pill {
  padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 600;
  background: var(--s2); color: var(--text2); border: 1px solid var(--border);
  cursor: pointer; transition: all var(--trans); white-space: nowrap;
}
.pill.active { background: var(--accent-dim); color: var(--accent2); border-color: #B4A2F555; }

.field-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); margin-bottom: 6px; }
.field-input, .field-select, .field-textarea {
  width: 100%; background: var(--s2); border: 1px solid var(--border2);
  color: var(--text); border-radius: var(--r-sm); padding: 10px 12px;
  font-size: 13px; outline: none;
}
.field-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.field-row { display: flex; gap: 8px; }
.field-row > div { flex: 1; }
.field-group { margin-bottom: 10px; }

/* ── TOAST ──────────────────────────────────────────────────────────────── */
#toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
  background: var(--s2); border: 1px solid var(--border2); color: var(--text);
  padding: 10px 18px; border-radius: 99px; font-size: 13px; font-weight: 600;
  z-index: 999; transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; box-shadow: 0 8px 28px #B4A2F540;
  max-width: 88vw; overflow: hidden; text-overflow: ellipsis;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════════════════════════════════════
   SCREEN 1 — INICIO
═══════════════════════════════════════════════════════════════════════════ */
.inicio-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.inicio-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.inicio-logo span { color: var(--accent); }
.inicio-day-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 500; color: var(--text2);
  background: var(--s2); padding: 5px 12px; border-radius: 99px;
  border: 1px solid var(--border);
}

/* ECG signature line */
.ecg-line {
  width: 100%; height: 36px; margin: 4px 0 20px;
  overflow: hidden; position: relative;
}
.ecg-line svg { position: absolute; top: 0; left: 0; }
.ecg-path {
  stroke-dasharray: 600;
  stroke-dashoffset: 600;
  animation: ecg-draw 2s ease forwards 0.3s;
}
@keyframes ecg-draw { to { stroke-dashoffset: 0; } }

/* Hero card */
.hero-card {
  background: linear-gradient(135deg, #F3ECFB 0%, #FFFFFF 100%);
  border: 1px solid #DCCBF2;
  border-radius: var(--r-xl); padding: 22px 20px 20px;
  margin-bottom: 12px; position: relative; overflow: hidden;
}
.hero-card::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle, #D9C6F550 0%, transparent 70%);
  pointer-events: none;
}
.hero-specialty {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--accent2); margin-bottom: 8px;
}
.hero-tema { font-size: 20px; font-weight: 800; letter-spacing: -0.4px; line-height: 1.2; margin-bottom: 6px; }
.hero-why {
  font-size: 12.5px; color: var(--text2); line-height: 1.6; margin-bottom: 16px;
}
.hero-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.hero-meta .tag { background: var(--s2); color: var(--text2); border: 1px solid var(--border); }

.inicio-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 12px 10px; text-align: center;
}
.stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 500; color: var(--accent2); line-height: 1;
}
.stat-label { font-size: 10px; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Progreso diario */
.daily-progress {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 16px; margin-bottom: 10px;
}
.dp-label { font-size: 12px; color: var(--text2); margin-bottom: 10px; font-weight: 500; }
.dp-bar-wrap { height: 6px; background: var(--s3); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
.dp-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.5s ease; }
.dp-steps { display: flex; justify-content: space-between; }
.dp-step { font-size: 10px; color: var(--text3); font-weight: 600; }
.dp-step.done { color: var(--green-ink); }

/* ═══════════════════════════════════════════════════════════════════════════
   SCREEN 2 — MI PLAN
═══════════════════════════════════════════════════════════════════════════ */
.plan-filters { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; }
.plan-filters::-webkit-scrollbar { display: none; }

.spec-section { margin-bottom: 16px; }
.spec-header {
  display: flex; align-items: center; gap: 10px; padding: 12px 14px;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r-md); margin-bottom: 6px; cursor: pointer;
}
.spec-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.spec-name { font-size: 14px; font-weight: 700; flex: 1; }
.spec-count { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
.spec-chevron { color: var(--text3); transition: transform var(--trans); font-size: 12px; }
.spec-section.open .spec-chevron { transform: rotate(90deg); }

.tema-item {
  display: flex; align-items: center; gap: 12px; padding: 13px 14px;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r-md); margin-bottom: 4px; cursor: pointer;
  transition: all var(--trans); margin-left: 8px;
  box-shadow: 0 1px 8px #B4A2F512;
}
.tema-item:active { background: var(--s2); }
.tema-item.dominado { opacity: 0.5; }
.tema-estado-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--border2);
}
.tema-estado-dot.no_iniciado { background: transparent; }
.tema-estado-dot.en_progreso { background: var(--yellow); border-color: var(--yellow); }
.tema-estado-dot.dominado { background: var(--green); border-color: var(--green); }

.tema-info { flex: 1; min-width: 0; }
.tema-nombre { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tema-meta { display: flex; gap: 6px; align-items: center; margin-top: 3px; flex-wrap: wrap; }
.tema-dif { font-size: 11px; color: var(--yellow-ink); letter-spacing: 1px; }
.tema-prio { font-size: 10px; color: var(--text3); }
.tema-time { font-size: 10px; color: var(--text3); }
.tema-chevron { color: var(--text3); font-size: 12px; }

.spec-section.open .tema-item { display: flex; }
.spec-section:not(.open) .tema-item { display: none; }

/* ═══════════════════════════════════════════════════════════════════════════
   SCREEN 3 — TEMA ACTUAL (MEDIC)
═══════════════════════════════════════════════════════════════════════════ */
.medic-header { margin-bottom: 20px; }
.medic-spec { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.medic-titulo { font-size: 20px; font-weight: 800; letter-spacing: -0.4px; line-height: 1.25; margin-bottom: 10px; }
.medic-tags { display: flex; gap: 6px; flex-wrap: wrap; }

.medic-steps { display: flex; flex-direction: column; gap: 8px; }
.medic-step {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r-lg); overflow: hidden;
  transition: border-color var(--trans);
  box-shadow: 0 2px 12px #B4A2F516;
}
.medic-step.done { border-color: #8FDBB660; }
.medic-step-header {
  display: flex; align-items: center; gap: 14px; padding: 16px;
  cursor: pointer;
}

function getAllEspecialidades() {
  return ESPECIALIDADES.concat(STATE.customEspecialidades || []);

function getAllTemasRaw() {
  return TEMAS.concat(STATE.customTemas || []);
}

// Devuelve solo los temas activos, con overrides aplicados (nombre/dif/prio/tiempo/módulo)
function getAllTemas() {
  return getAllTemasRaw()
    .map(t => {
      const o = STATE.temaOverrides[t.id];
      return o ? { ...t, ...o } : t;
    })
    .filter(t => t.activo !== false);
}

    const o = STATE.temaOverrides[t.id];
    return o ? { ...t, ...o } : t;
  });
}

function getTiempoEstimado(t) {
  return t.timeMin || (45 + t.dif * 15);
}

function isCustomTema(id) { return (STATE.customTemas || []).some(t => t.id === id); }

// ═══════════════════════════════════════════════════════════════════════════
// PLAN 90 DÍAS — ALGORITMO DE SECUENCIACIÓN
// Principio: los temas sin dependencias (nodos raíz) van primero.
// Luego se ordenan por: prioridad A > B > C, luego dif asc (fácil→difícil)
// ═══════════════════════════════════════════════════════════════════════════

function calcularPlan() {
  const temas = getAllTemas();
  const completados = new Set(STATE.completados || []);
  const ordered = [];
  const visited = new Set();

  function canStudy(t) {
    return (t.deps || []).every(d => completados.has(d) || visited.has(d) || !temas.find(x=>x.id===d));
  }

  let iterations = 0;
  while (ordered.length < temas.length && iterations < 400) {
    iterations++;
    const available = temas.filter(t => !visited.has(t.id) && canStudy(t));
    if (!available.length) {
      temas.filter(t => !visited.has(t.id)).forEach(t => { visited.add(t.id); ordered.push(t); });
      break;
    }
    available.sort((a, b) => {
      const pA = a.prio === 'A' ? 0 : a.prio === 'B' ? 1 : 2;
      const pB = b.prio === 'A' ? 0 : b.prio === 'B' ? 1 : 2;
      if (pA !== pB) return pA - pB;
      return a.dif - b.dif;
    });
    const next = available[0];
    visited.add(next.id);
    ordered.push(next);
  }
  return ordered;
}

function getPlanOrdenado() { return calcularPlan(); }

function getTemaDelDia() {
  const plan = getPlanOrdenado();
  if (!plan.length) return null;
  // El tema del día es siempre el primer tema pendiente (no dominado) del plan
  const pendiente = plan.find(t => getTemaEstado(t.id) !== 'dominado');
  return pendiente || plan[plan.length - 1];
}

function getSpec(specId) {
  return getAllEspecialidades().find(e => e.id === specId) || { name: specId, color: '#B8A9F0', emoji: '📚' };
}

function getDifStars(n) {
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function getTemaEstado(id) {
  return STATE.estados[id] || 'no_iniciado';
}

let currentScreen = 'inicio';

  currentScreen = screen;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const scr = document.getElementById('s-' + screen);
  if (scr) scr.classList.add('active');
  const navBtn = document.querySelector(`.nav-btn[data-screen="${screen}"]`);
  if (navBtn) navBtn.classList.add('active');
  renderScreen(screen);
}

function renderScreen(screen) {
  const el = document.getElementById('s-' + screen);
  if (!el) return;
  if (screen === 'inicio')    el.innerHTML = renderInicio();
  if (screen === 'plan')      el.innerHTML = renderPlan();
  if (screen === 'tema')      el.innerHTML = renderTema();
  if (screen === 'prompts')   el.innerHTML = renderPrompts();
  if (screen === 'progreso')  el.innerHTML = renderProgreso();
  if (screen === 'config')    el.innerHTML = renderConfig();
}

        </div>
        <div class="dp-steps">
          ${MEDIC_META.map(s => `<div class="dp-step ${medicData[s.key]?'done':''}">${s.key}</div>`).join('')}
        </div>
      </div>

      <button class="btn btn-secondary" onclick="replanificarSemana()" style="margin-top:4px;">
        🔄 Replanificar semana
      </button>

      <button class="btn btn-ghost" onclick="goTo('prompts')" style="margin-top:8px; width: 100%; display: block; text-align: center;">
        ◎ Abrir prompts para Gemini y NotebookLM →
      </button>
    </div>
  `;
}

function abrirSesion() {
  const tema = getTemaDelDia();
  if (!tema) return;
  STATE.activeTema = tema.id;
  if (STATE.estados[tema.id] === 'no_iniciado' || !STATE.estados[tema.id]) {
    STATE.estados[tema.id] = 'en_progreso';
  }
  saveState();
  goTo('tema');
}

// Reorganiza el plan reconociendo cuántos temas realmente se completaron,
// para que "Día X" siempre refleje la realidad si algún día no se estudió (o se adelantó).
function replanificarSemana() {
  const completadosReales = (STATE.completados || []).length;
  const diaAnterior = STATE.dia;
  STATE.dia = Math.min(completadosReales + 1, 90);
  saveState();
  if (STATE.dia === diaAnterior) {
    showToast('✓ El plan ya estaba al día');
  } else if (STATE.dia < diaAnterior) {
    showToast(`🔄 Plan ajustado — ahora estás en el día ${STATE.dia}`);
  } else {
    showToast(`🔄 Plan reorganizado — día ${STATE.dia}`);
  }
  renderScreen('inicio');
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER: MI PLAN
// ═══════════════════════════════════════════════════════════════════════════

let planFilter = 'todos';
let openSpecs = {};

function renderPlan() {
  const plan = getPlanOrdenado();
  const temaDelDia = getTemaDelDia();

  const filterBtns = ['todos','A','B','no_iniciado','en_progreso','dominado'].map(f => {
    const labels = { todos:'Todos', A:'Alta prioridad', B:'Media', no_iniciado:'No iniciado', en_progreso:'En progreso', dominado:'Dominado' };
    return `<div class="pill ${planFilter===f?'active':''}" onclick="setPlanFilter('${f}')">${labels[f]}</div>`;
  }).join('');

  const sections = getAllEspecialidades().map(spec => {
    const temasSpec = plan.filter(t => t.spec === spec.id);
    const filtrados = temasSpec.filter(t => {
      if (planFilter === 'todos') return true;
      if (planFilter === 'A' || planFilter === 'B') return t.prio === planFilter;
      return getTemaEstado(t.id) === planFilter;
    });
    if (!filtrados.length) return '';

    const dominadosSpec = filtrados.filter(t => getTemaEstado(t.id) === 'dominado').length;
    const isOpen = openSpecs[spec.id] !== false;

    const items = filtrados.map((t) => {
      const estado = getTemaEstado(t.id);
      const isHoy = temaDelDia && temaDelDia.id === t.id;
      return `
        <div class="tema-item ${estado}" onclick="abrirTema('${t.id}')">
          <div class="tema-estado-dot ${estado}"></div>
          <div class="tema-info">
            <div class="tema-nombre">${isHoy ? '▶ ' : ''}${t.nombre}</div>
            <div class="tema-meta">
              <span class="tema-dif">${getDifStars(t.dif)}</span>
              <span class="tema-prio">· Prio ${t.prio}</span>
              <span class="tema-time">· ⏱ ${getTiempoEstimado(t)} min</span>
              ${isHoy ? `<span class="tag" style="font-size:9px;background:var(--accent-dim);color:var(--accent2);padding:2px 6px;">HOY</span>` : ''}
            </div>
          </div>
          <div class="tema-chevron">›</div>
        </div>
      `;
    }).join('');

    return `
      <div class="spec-section ${isOpen?'open':''}" id="spec-${spec.id}">
        <div class="spec-header" onclick="toggleSpec('${spec.id}')">
          <div class="spec-dot" style="background:${spec.color}"></div>
          <div class="spec-name">${spec.emoji} ${spec.name}</div>
          <div class="spec-count">${dominadosSpec}/${filtrados.length}</div>
          <div class="spec-chevron">›</div>
        </div>
        ${items}
      </div>
    `;
  }).join('');

  return `
    <div class="page-title-row">
      <div class="page-title">Mi Plan</div>
      <button class="icon-btn" onclick="goTo('config')" title="Configuración del temario">⚙︎</button>
    </div>
    <div class="page-sub">Secuenciado por dependencias — no por orden del libro</div>
    <div class="plan-filters">${filterBtns}</div>
    ${sections || '<div style="text-align:center;color:var(--text3);padding:40px 0;">Sin temas con este filtro</div>'}
  `;
}

function setPlanFilter(f) {
  planFilter = f;
  renderScreen('plan');
}

function toggleSpec(id) {
  openSpecs[id] = !(openSpecs[id] !== false);
  renderScreen('plan');
}

function abrirTema(id) {
  STATE.activeTema = id;
  if (!STATE.estados[id] || STATE.estados[id] === 'no_iniciado') {
    STATE.estados[id] = 'en_progreso';
  }
  saveState();
  goTo('tema');
}

// RENDER: TEMA ACTUAL (MEDIC)
// ═══════════════════════════════════════════════════════════════════════════

let openMedicSteps = {};
let noEntendiOpen = false;

function renderTema() {
  const temaId = STATE.activeTema || (getTemaDelDia() || {}).id;
  const tema = getAllTemas().find(t => t.id === temaId) || getTemaDelDia();
  if (!tema) {
    return `<div class="page-title">Tema</div><div class="card" style="text-align:center;padding:40px 16px;">No hay ningún tema activo seleccionado.</div>`;
  }
  const spec = getSpec(tema.spec);
  const estado = getTemaEstado(tema.id);
  const medicData = STATE.medicSteps[tema.id] || {};
  const stepsHechos = MEDIC_META.filter(s => medicData[s.key]).length;
  const allDone = stepsHechos === MEDIC_META.length;

  const estadoColor = estado === 'dominado' ? 'var(--green-ink)' : estado === 'en_progreso' ? 'var(--yellow-ink)' : 'var(--text3)';
  const estadoLabel = { no_iniciado: 'No iniciado', en_progreso: 'En progreso', dominado: 'Dominado' }[estado];

  const steps = MEDIC_META.map((s) => {
    const done = !!medicData[s.key];
    const isOpen = openMedicSteps[s.key] !== false && !done;
    return `
      <div class="medic-step ${done?'done':''} ${isOpen?'open':''}" id="ms-${s.key}">
        <div class="medic-step-header" onclick="toggleMedicStep('${s.key}')">
          <div class="medic-check" onclick="event.stopPropagation();toggleMedicCheck('${tema.id}','${s.key}')">
            ${done ? '✓' : ''}
          </div>
          <div class="medic-step-icon">${s.icon}</div>
          <div class="medic-step-info">
            <div class="medic-step-label">${s.key} · ${s.label}</div>
            <div class="medic-step-title">${s.title}</div>
          </div>
          <div class="medic-step-chevron">›</div>
        </div>
        <div class="medic-step-body">
          ${s.getContent(tema)}
        </div>
      </div>
    `;
  }).join('');

  const segs = MEDIC_META.map(s => `<div class="medic-seg ${medicData[s.key]?'done':''}"></div>`).join('');

  const notaActual = STATE.notas[tema.id] || '';

  const neOptions = getNoEntendiPrompts(tema).map(o => `
    <div class="ne-option" onclick="openNeModal('${o.key}', '${o.label}', '${o.icon}')"><span>${o.icon}</span> ${o.label}</div>
  `).join('');

  return `
    <div class="medic-header">
      <div class="medic-spec" style="color:${spec.color}">${spec.emoji} ${spec.name}</div>
      <div class="medic-titulo">${tema.nombre}</div>
      <div class="medic-tags">
        <span class="tag" style="background:${spec.color}18;color:${spec.color};">${getDifStars(tema.dif)}</span>
        <span class="tag" style="background:${estadoColor}18;color:${estadoColor};">${estadoLabel}</span>
        <span class="tag" style="background:var(--s2);color:var(--text2);">${stepsHechos}/5 MEDIC</span>
      </div>
    </div>

    <div class="medic-progress-strip">${segs}</div>

    <div class="medic-steps">${steps}</div>

    <button class="medic-finish-btn ${allDone?'enabled':''}" onclick="marcarDominado('${tema.id}')">
      ✓ Marcar como Dominado
    </button>

    <div class="section-label">Notas personales</div>
    <textarea class="field-textarea" placeholder="Escribe aquí tus propias notas, dudas o resúmenes de este tema..."
      onchange="guardarNota('${tema.id}', this.value)">${notaActual}</textarea>

    <button class="no-entendi-btn" onclick="toggleNoEntendi()">
      🤔 No entendí — reabordar este tema
    </button>
    <div class="ne-options ${noEntendiOpen?'open':''}" id="ne-options">
      ${neOptions}
    </div>

    <div style="margin-top:14px;">
      <button class="btn btn-secondary" onclick="goTo('prompts')" style="font-size:13px;padding:12px;">
        ◎ Abrir prompts para este tema →
      </button>
    </div>
  `;
}

function toggleMedicStep(key) {
  openMedicSteps[key] = openMedicSteps[key] === false ? true : false;
  renderScreen('tema');
}

function toggleMedicCheck(temaId, key) {
  if (!STATE.medicSteps[temaId]) STATE.medicSteps[temaId] = {};
  STATE.medicSteps[temaId][key] = !STATE.medicSteps[temaId][key];
  if (STATE.medicSteps[temaId][key]) openMedicSteps[key] = false;
  else openMedicSteps[key] = true;
  if (STATE.estados[temaId] === 'no_iniciado') STATE.estados[temaId] = 'en_progreso';
  saveState();
  renderScreen('tema');
}

function guardarNota(temaId, texto) {
  STATE.notas[temaId] = texto;
  saveState();
  showToast('✓ Nota guardada');
}

function toggleNoEntendi() {
  noEntendiOpen = !noEntendiOpen;
  const el = document.getElementById('ne-options');
  if (el) el.classList.toggle('open', noEntendiOpen);
}

function marcarDominado(temaId) {
  STATE.estados[temaId] = 'dominado';
  if (!STATE.completados.includes(temaId)) STATE.completados.push(temaId);
  const hoy = new Date().toISOString().split('T')[0];
  STATE.heatmap[hoy] = (STATE.heatmap[hoy] || 0) + 1;
  STATE.dia = Math.min(STATE.dia + 1, 90);
  STATE.activeTema = null;
  saveState();
  
  // Disparar celebración de confeti
  try { launchConfetti(); } catch(e) { console.error(e); }
  
  showToast('✓ Tema dominado — Día ' + STATE.dia);
  setTimeout(() => goTo('inicio'), 1200);
}

function renderPrompts() {
  const temaId = STATE.activeTema || (getTemaDelDia() || {}).id;
  const tema = getAllTemas().find(t => t.id === temaId) || getTemaDelDia();
  const categorias = getPromptCategories(tema);

  const cards = categorias.map((p, i) => `
    <div class="prompt-card">
      <div class="prompt-card-label"><span>${p.icon}</span> ${p.label}</div>
      <div class="prompt-card-title">${p.title}</div>
      <div class="prompt-card-preview">${p.preview}</div>
      <div style="display: flex; gap: 8px;">
        <button class="prompt-copy-btn" onclick="copyPrompt(${i})" style="flex: 1; padding: 10px;">
          <span>📋</span> Copiar
        </button>
        <button class="prompt-copy-btn" onclick="abrirGeminiPromptsTab(${i})" style="flex: 1; padding: 10px; background: var(--accent-dim); color: var(--accent2); border-color: #B4A2F555;">
          <span>🚀</span> Gemini
        </button>
      </div>
    </div>
  `).join('');

  window._currentPrompts = categorias;

  return `
    <div class="page-title">Prompts</div>
    <div class="page-sub">Para: <strong>${tema ? tema.nombre : '—'}</strong> · listos para Gemini o NotebookLM</div>
    ${cards}
    <div class="card" style="background:var(--s2);border-style:dashed;margin-top:6px;">
      <div style="font-size:12px;color:var(--text2);line-height:1.7;">
        💡 <strong style="color:var(--text);">Cómo usar:</strong> Copia el prompt o pulsa "Gemini" para abrir la sesión de IA. Úsalo junto con tus fuentes del tema para entender mecanismos, no memorizar respuestas.
      </div>
    </div>
  `;
}

function copyText(text) {
  if (!text) return;
  navigator.clipboard.writeText(text)
    .then(() => showToast('📋 Prompt copiado'))
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('📋 Prompt copiado');
    });
}

function copyPrompt(idx) {
  const p = window._currentPrompts?.[idx];
  if (!p) return;
  copyText(p.prompt);
}

function abrirGeminiPromptsTab(idx) {
  const p = window._currentPrompts?.[idx];
  if (!p) return;
  const url = 'https://gemini.google.com/app?q=' + encodeURIComponent(p.prompt);
  window.open(url, '_blank');
}

// RENDER: PROGRESO
// ═══════════════════════════════════════════════════════════════════════════

function calcRacha() {
  let racha = 0;
  let d = new Date();
  while (true) {
    const key = d.toISOString().split('T')[0];
    if ((STATE.heatmap[key] || 0) > 0) {
      racha++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return racha;
}

function calcHorasEstudiadas() {
  const temas = getAllTemasConInactivos();
  const minutos = (STATE.completados || []).reduce((sum, id) => {
    const t = temas.find(x => x.id === id);
    return sum + (t ? getTiempoEstimado(t) : 0);
  }, 0);
  return (minutos / 60);
}

function calcEspecialidadesFuerteDebil() {
  const specs = getAllEspecialidades();
  const temas = getAllTemas();
  const pcts = specs.map(spec => {
    const ts = temas.filter(t => t.spec === spec.id);
    if (!ts.length) return null;
    const dom = ts.filter(t => getTemaEstado(t.id) === 'dominado').length;
    return { spec, pct: Math.round((dom / ts.length) * 100), dom, total: ts.length };
  }).filter(Boolean);
  const conProgreso = pcts.filter(p => p.dom > 0);
  if (!conProgreso.length) return { fuerte: null, debil: null };
  const sorted = [...conProgreso].sort((a,b) => b.pct - a.pct);
  return { fuerte: sorted[0], debil: sorted[sorted.length - 1] };
}

function isTejedorDeRedes() {
  const plan = getAllTemasRaw();
  return (STATE.completados || []).some(id => {
    const tema = plan.find(t => t.id === id);
    if (!tema) return false;
    const unlockCount = (tema.unlock || []).filter(uId => plan.some(x => x.id === uId)).length;
    return unlockCount >= 5;
  });
}

function toggleBitacora() {
  window.bitacoraOpen = !window.bitacoraOpen;
  renderScreen('progreso');
}

function renderProgreso() {
  const temas = getAllTemas();
  const totalTemas = temas.length;
  const dominados = temas.filter(t => getTemaEstado(t.id) === 'dominado').length;
  const diasRestantes = Math.max(90 - STATE.dia + 1, 0);
  const racha = calcRacha();
  const horas = calcHorasEstudiadas();
  const { fuerte, debil } = calcEspecialidadesFuerteDebil();

  const hoy = new Date().toISOString().split('T')[0];
  const metaHoyCompletada = (STATE.heatmap[hoy] || 0) > 0;
  const rachaClass = metaHoyCompletada ? 'streak-active' : 'streak-pending';

  const fuerteHtml = fuerte ? `
    <div class="spec-strength-row">
      <div class="spec-strength-icon">${fuerte.spec.emoji}</div>
      <div class="spec-strength-text">
        <div class="spec-strength-title">Especialidad más fuerte</div>
        <div class="spec-strength-name">${fuerte.spec.name}</div>
      </div>
      <div class="spec-strength-pct" style="color:var(--green-ink);">${fuerte.pct}%</div>
    </div>` : '';

  const debilHtml = (debil && debil !== fuerte) ? `
    <div class="spec-strength-row">
      <div class="spec-strength-icon">${debil.spec.emoji}</div>
      <div class="spec-strength-text">
        <div class="spec-strength-title">Especialidad más débil</div>
        <div class="spec-strength-name">${debil.spec.name}</div>
      </div>
      <div class="spec-strength-pct" style="color:var(--red-ink);">${debil.pct}%</div>
    </div>` : '';

  const sinDatos = (!fuerte && !debil) ? `
    <div class="card" style="text-align:center;color:var(--text3);font-size:13px;">
      Domina al menos un tema para ver tu especialidad más fuerte y más débil.
    </div>` : '';

  // Logros (Medallas)
  const medals = [
    { id: 'primer_resp', icon: '🎖️', name: 'Primer Respondedor', desc: '1 tema dom.' },
    { id: 'fuego_sost', icon: '🔥', name: 'Fuego Sostenido', desc: 'Racha de 5 días' },
    { id: 'tejedor_red', icon: '🕸️', name: 'Tejedor de Redes', desc: 'Nodo raíz dom.' },
    { id: 'modo_guardia', icon: '🌙', name: 'Modo Guardia', desc: 'Modo oscuro' },
    { id: 'portador_saber', icon: '🔗', name: 'Portador Saber', desc: 'Link generado' }
  ];

  // Evaluar estados
  const medalsUnlocked = {
    primer_resp: STATE.completados.length >= 1,
    fuego_sost: racha >= 5,
    tejedor_red: isTejedorDeRedes(),
    modo_guardia: !!STATE.guardiaNocturna,
    portador_saber: !!STATE.linkGenerado
  };

  const medalsHtml = medals.map(m => {
    const isUnlocked = medalsUnlocked[m.id];
    return `
      <div class="medal-card ${isUnlocked ? '' : 'locked'}" title="${m.desc}">
        <div class="medal-icon">${m.icon}</div>
        <div class="medal-name">${m.name}</div>
        <div class="medal-desc">${m.desc}</div>
      </div>
    `;
  }).join('');

  // Bitácora de Insights colapsable
  if (window.bitacoraOpen === undefined) window.bitacoraOpen = false;
  const dominatedTemas = temas.filter(t => getTemaEstado(t.id) === 'dominado');
  const notesList = dominatedTemas.map(t => {
    const note = STATE.notas[t.id]?.trim();
    if (!note) return '';
    const spec = getSpec(t.spec);
    return `
      <div class="bitacora-item" style="border-left: 3px solid ${spec.color}; padding-left: 10px; margin-bottom: 12px; text-align: left;">
        <div style="font-size: 11px; font-weight: 700; color: ${spec.color};">${spec.emoji} ${t.nombre}</div>
        <div style="font-size: 12px; color: var(--text); white-space: pre-wrap; margin-top: 4px; line-height: 1.5;">${note}</div>
      </div>
    `;
  }).filter(Boolean).join('');

  const bitacoraHtml = `
    <div class="section-label" style="display:flex; align-items:center; justify-content:space-between; cursor:pointer; margin-top: 18px;" onclick="toggleBitacora()">
      <span>📋 Bitácora de Insights (${dominatedTemas.filter(t => STATE.notas[t.id]?.trim()).length})</span>
      <span style="font-size:12px; color:var(--text3); transition: transform var(--trans); display: inline-block; transform: ${window.bitacoraOpen ? 'rotate(90deg)' : 'none'};">›</span>
    </div>
    <div style="display: ${window.bitacoraOpen ? 'block' : 'none'}; margin-top: 8px;">
      <div class="card" style="max-height: 250px; overflow-y: auto; padding: 12px 14px;">
        ${notesList || '<div style="font-size:11.5px; color:var(--text3); text-align:center; padding:10px 0;">No hay notas guardadas en temas dominados aún.</div>'}
      </div>
    </div>
  `;

  return `
    <div class="page-title">Progreso</div>
    <div class="page-sub">90 días de preparación</div>

    <div class="progress-big-grid">
      <div class="progress-big-card">
        <div class="progress-big-num">${horas.toFixed(1)}h</div>
        <div class="progress-big-label">Horas estudiadas</div>
      </div>
      <div class="progress-big-card">
        <div class="progress-big-num ${rachaClass}">${racha}🔥</div>
        <div class="progress-big-label">Racha (días)</div>
      </div>
      <div class="progress-big-card">
        <div class="progress-big-num" style="color:var(--green-ink);">${dominados}/${totalTemas}</div>
        <div class="progress-big-label">Temas completados</div>
      </div>
      <div class="progress-big-card">
        <div class="progress-big-num">${diasRestantes}</div>
        <div class="progress-big-label">Días restantes</div>
      </div>
    </div>

    <!-- SISTEMA DE LOGROS / MEDALLAS -->
    <div class="section-label">Medallas de Logros</div>
    <div class="medals-grid">
      ${medalsHtml}
    </div>

    <div class="section-label">Especialidades</div>
    ${fuerteHtml}${debilHtml}${sinDatos}

    <!-- BITÁCORA DE INSIGHTS -->
    ${bitacoraHtml}

    <div style="margin-top:20px; display: flex; flex-direction: column; gap: 8px;">
      <button class="btn btn-primary" onclick="exportarProgreso()" style="font-size:13px; padding: 12px;">
        🔗 Generar Link Portátil
      </button>
      <button class="btn btn-secondary" style="font-size:13px; padding: 12px;" onclick="if(confirm('¿Reiniciar TODO el progreso? Esto no borra tu temario personalizado.')){STATE.dia=1;STATE.completados=[];STATE.estados={};STATE.medicSteps={};STATE.notas={};STATE.heatmap={};STATE.activeTema=null;saveState();goTo('inicio');}">
        Reiniciar progreso
      </button>
    </div>
  `;
}

// RENDER: CONFIGURACIÓN DEL TEMARIO

let expandedConfigTemas = {};

function renderConfig() {
  const specs = getAllEspecialidades();
  const temas = getAllTemasConInactivos();

  const specOptions = specs.map(s => `<option value="${s.id}">${s.emoji} ${s.name}</option>`).join('');

  const rows = temas.map(t => {
    const spec = getSpec(t.spec);
    const isExpanded = !!expandedConfigTemas[t.id];
    const activo = t.activo !== false;
    return `
      <div class="config-tema-row ${isExpanded?'expanded':''}" id="cfgrow-${t.id}">
        <div class="config-tema-top" onclick="toggleConfigTema('${t.id}')">
          <div class="spec-dot" style="background:${spec.color}"></div>
          <strong style="${activo?'':'color:var(--text3);text-decoration:line-through;'}">${t.nombre}</strong>
          <label class="switch" onclick="event.stopPropagation()">
            <input type="checkbox" ${activo?'checked':''} onchange="toggleTemaActivo('${t.id}', this.checked)">
            <div class="switch-track"></div>
            <div class="switch-thumb"></div>
          </label>
        </div>
        <div class="config-tema-fields">
          <div>
            <div class="field-label">Nombre</div>
            <input class="field-input" value="${t.nombre.replace(/"/g,'&quot;')}" onchange="updateTemaField('${t.id}','nombre',this.value)">
          </div>
          <div>
            <div class="field-label">Módulo</div>
            <select class="field-select" onchange="updateTemaField('${t.id}','spec',this.value)">
              ${specs.map(s => `<option value="${s.id}" ${s.id===t.spec?'selected':''}>${s.emoji} ${s.name}</option>`).join('')}
            </select>
          </div>
          <div>
            <div class="field-label">Dificultad (1-5)</div>
            <select class="field-select" onchange="updateTemaField('${t.id}','dif',parseInt(this.value))">
              ${[1,2,3,4,5].map(n => `<option value="${n}" ${n===t.dif?'selected':''}>${n}</option>`).join('')}
            </select>
          </div>
          <div>
            <div class="field-label">Prioridad</div>
            <select class="field-select" onchange="updateTemaField('${t.id}','prio',this.value)">
              ${['A','B','C'].map(p => `<option value="${p}" ${p===t.prio?'selected':''}>${p}</option>`).join('')}
            </select>
          </div>
          <div>
            <div class="field-label">Tiempo est. (min)</div>
            <input class="field-input" type="number" min="10" step="5" value="${getTiempoEstimado(t)}" onchange="updateTemaField('${t.id}','timeMin',parseInt(this.value)||45)">
          </div>
          ${isCustomTema(t.id) ? `<div style="flex-basis:100%;"><button class="btn btn-secondary config-delete-btn" onclick="deleteCustomTema('${t.id}')">🗑 Eliminar tema</button></div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="config-back">
      <button class="icon-btn" onclick="goTo('plan')">←</button>
      <div class="page-title">Configuración del Temario</div>
    </div>
    <div class="page-sub">Cada cambio reorganiza automáticamente tu plan de estudio.</div>

    <div class="card config-add-card">
      <div class="section-label" style="margin-top:0;">Agregar módulo nuevo</div>
      <div class="field-row field-group">
        <div><input class="field-input" id="new-mod-name" placeholder="Nombre del módulo"></div>
        <div style="max-width:70px;"><input class="field-input" id="new-mod-emoji" placeholder="🩹" maxlength="2"></div>
      </div>
      <button class="btn btn-secondary" onclick="addModulo()">+ Crear módulo</button>
    </div>

    <div class="card config-add-card">
      <div class="section-label" style="margin-top:0;">Agregar tema nuevo</div>
      <div class="field-group"><input class="field-input" id="new-tema-nombre" placeholder="Nombre del tema"></div>
      <div class="field-row field-group">
        <div>
          <div class="field-label">Módulo</div>
          <select class="field-select" id="new-tema-spec">${specOptions}</select>
        </div>
        <div>
          <div class="field-label">Dificultad</div>
          <select class="field-select" id="new-tema-dif">${[1,2,3,4,5].map(n=>`<option value="${n}" ${n===3?'selected':''}>${n}</option>`).join('')}</select>
        </div>
      </div>
      <div class="field-row field-group">
        <div>
          <div class="field-label">Prioridad</div>
          <select class="field-select" id="new-tema-prio">
            <option value="A">A</option><option value="B" selected>B</option><option value="C">C</option>
          </select>
        </div>
        <div>
          <div class="field-label">Tiempo (min)</div>
          <input class="field-input" id="new-tema-time" type="number" min="10" step="5" value="60">
        </div>
      </div>
      <button class="btn btn-secondary" onclick="addTema()">+ Agregar tema</button>
    </div>

    <div class="section-label">Temario completo (${temas.length} temas)</div>
    ${rows}
  `;
}

function toggleConfigTema(id) {
  expandedConfigTemas[id] = !expandedConfigTemas[id];
  renderScreen('config');
}

function ensureOverride(id) {
  if (!STATE.temaOverrides[id]) STATE.temaOverrides[id] = {};
  return STATE.temaOverrides[id];
}

function updateTemaField(id, field, value) {
  if (isCustomTema(id)) {
    const t = STATE.customTemas.find(x => x.id === id);
    if (t) t[field] = value;
  } else {
    ensureOverride(id)[field] = value;
  }
  saveState();
  showToast('✓ Tema actualizado');
  renderScreen('config');
}

function toggleTemaActivo(id, activo) {
  if (isCustomTema(id)) {
    const t = STATE.customTemas.find(x => x.id === id);
    if (t) t.activo = activo;
  } else {
    ensureOverride(id).activo = activo;
  }
  saveState();
  renderScreen('config');
}

function deleteCustomTema(id) {
  if (!confirm('¿Eliminar este tema permanentemente?')) return;
  STATE.customTemas = STATE.customTemas.filter(t => t.id !== id);
  delete STATE.temaOverrides[id];
  if (STATE.activeTema === id) STATE.activeTema = null;
  saveState();
  showToast('🗑 Tema eliminado');
  renderScreen('config');
}

function addModulo() {
  const name = document.getElementById('new-mod-name').value.trim();
  const emoji = document.getElementById('new-mod-emoji').value.trim() || '📚';
  if (!name) { showToast('Escribe un nombre para el módulo'); return; }
  const colors = ['#F5A9B8','#A8D8F0','#B8A9F0','#D8B4E2','#F5D397','#F5B89C','#A0DFC0','#9FD9E0','#E8AEDD','#D7E29B'];
  const id = 'mod_' + Date.now();
  STATE.customEspecialidades.push({ id, name, emoji, color: colors[Math.floor(Math.random()*colors.length)] });
  saveState();
  showToast('✓ Módulo creado');
  renderScreen('config');
}

function addTema() {
  const nombre = document.getElementById('new-tema-nombre').value.trim();
  const spec = document.getElementById('new-tema-spec').value;
  const dif = parseInt(document.getElementById('new-tema-dif').value);
  const prio = document.getElementById('new-tema-prio').value;
  const timeMin = parseInt(document.getElementById('new-tema-time').value) || 45;
  if (!nombre) { showToast('Escribe un nombre para el tema'); return; }
  const id = 'custom_' + Date.now();
  STATE.customTemas.push({ id, spec, nombre, dif, prio, timeMin, deps: [], unlock: [], activo: true });
  saveState();
  showToast('✓ Tema agregado');
  document.getElementById('new-tema-nombre').value = '';
  renderScreen('config');
}

  saveState();
  updateThemeToggleIcon();

function updateThemeToggleIcon() {
  const btn = document.getElementById('theme-toggle');
  if (btn) {
    btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';

function initDarkMode() {
  if (STATE.guardiaNocturna) {
    document.body.classList.add('dark-mode');
  } else {
    document.body.classList.remove('dark-mode');
  }
  updateThemeToggleIcon();
}

// ═══════════════════════════════════════════════════════════════════════════
// CELEBRACIÓN DE CONFETI
// ═══════════════════════════════════════════════════════════════════════════

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';

  const colors = ['#8FDBB6', '#F7CE8A', '#F5A7AE', '#A3D4F2', '#B4A2F5', '#FFFFFF'];
  const particles = [];

  for (let i = 0; i < 150; i++) {
    particles.push({
      x: canvas.width / 2,
      y: canvas.height / 2 - 50, // shoot from center
      vx: (Math.random() - 0.5) * 16,
      vy: (Math.random() - 0.7) * 16 - 5,
      size: Math.random() * 8 + 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      rotationSpeed: (Math.random() - 0.5) * 12,
      opacity: 1,
      gravity: 0.3,
      drift: (Math.random() - 0.5) * 1.5
    });
  }

  let animationFrameId;
  function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let active = false;

    particles.forEach(p => {
      p.x += p.vx + p.drift;
      p.y += p.vy;
      p.vy += p.gravity;
      p.rotation += p.rotationSpeed;
      
      if (p.vy > 0) {
        p.opacity -= 0.015;
      }

      if (p.opacity > 0) {
        active = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        ctx.restore();
      }
    });

    if (active) {
      animationFrameId = requestAnimationFrame(update);
    } else {
      canvas.style.display = 'none';
      cancelAnimationFrame(animationFrameId);
    }
  }

  update();
}

// ═══════════════════════════════════════════════════════════════════════════
// PORTABILIDAD DE DATOS (UN SOLO LINK)
// ═══════════════════════════════════════════════════════════════════════════

function exportarProgreso() {
  try {
    STATE.linkGenerado = true;
    saveState();
    const minified = JSON.stringify(STATE);
    const encoded = btoa(unescape(encodeURIComponent(minified)));
    const url = window.location.origin + window.location.pathname + '?data=' + encoded;
    
    navigator.clipboard.writeText(url)
      .then(() => {
        showToast('🔗 ¡Enlace portátil copiado al portapapeles!');
      })
      .catch(() => {
        // Fallback copy
        const ta = document.createElement('textarea');
        ta.value = url;
        ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('🔗 ¡Enlace portátil copiado!');
      });
  } catch(e) {
    showToast('❌ Error al generar enlace');
    console.error(e);
  }
}

let currentNePrompt = '';

function openNeModal(key, label, icon) {
  const temaId = STATE.activeTema || (getTemaDelDia() || {}).id;
  const tema = getAllTemas().find(t => t.id === temaId) || getTemaDelDia();
  const prompts = getNoEntendiPrompts(tema);
  const found = prompts.find(p => p.key === key);
  if (!found) return;

  currentNePrompt = found.prompt;
  document.getElementById('ne-modal-icon').textContent = icon;
  document.getElementById('ne-modal-title').textContent = label;
  document.getElementById('ne-prompt-text').textContent = found.prompt;
  document.getElementById('ne-gemini-response').value = '';

  document.getElementById('ne-modal').classList.add('open');
}

function closeNeModal() {
  document.getElementById('ne-modal').classList.remove('open');
}

function copiarPromptModal() {
  copyText(currentNePrompt);
}

function abrirGeminiDirecto() {
  const url = 'https://gemini.google.com/app?q=' + encodeURIComponent(currentNePrompt);
  window.open(url, '_blank');
}

function guardarExplicacionEnNotas() {
  const resp = document.getElementById('ne-gemini-response').value.trim();
  if (!resp) {
    showToast('⚠️ Escribe o pega la explicación primero');
    return;
  }
  const temaId = STATE.activeTema || (getTemaDelDia() || {}).id;
  if (!temaId) return;

  const currentNotes = STATE.notas[temaId] || '';
  const separator = currentNotes ? '\n\n---\n💡 Explicación de IA:\n' : '💡 Explicación de IA:\n';
  STATE.notas[temaId] = currentNotes + separator + resp;
  saveState();

  const mainTextarea = document.querySelector('.field-textarea');
  if (mainTextarea) mainTextarea.value = STATE.notas[temaId];

  showToast('💾 Explicación integrada a notas');
  closeNeModal();
}
